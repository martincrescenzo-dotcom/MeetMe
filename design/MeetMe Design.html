<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeetMe — Design</title>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="meetme-screens.jsx"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 0; }

    /* Input / textarea resets for the beige form */
    .mm-input::placeholder {
      color: #9A8F7E;
      font-family: "Courier New", Courier, monospace;
      opacity: 1;
    }
    .mm-input:focus {
      border-bottom-color: #1C1A16 !important;
    }
    .mm-input {
      -webkit-appearance: none;
      appearance: none;
    }

    /* Link hover: dim slightly */
    a[href="#"]:hover span[style*="underline"] {
      opacity: 0.65;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

// ─────────────────────────────────────────────
// Annotation chip shown above an artboard area
// ─────────────────────────────────────────────
function Note({ children }) {
  return (
    <div style={{
      fontFamily: '"Courier New", Courier, monospace',
      fontSize: 11,
      color: '#7a6e62',
      letterSpacing: '0.05em',
      lineHeight: 1.6,
      maxWidth: 375,
      paddingBottom: 12,
    }}>
      {children}
    </div>
  );
}

// ─────────────────────────────────────────────
// Thin beige artboard wrapper — gives screens
// a subtle border so they read as a frame
// ─────────────────────────────────────────────
function PhoneWrap({ children, label, note }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-start' }}>
      {note && <Note>{note}</Note>}
      <div style={{
        border: '1px solid #D4CCB8',
        borderRadius: 12,
        overflow: 'hidden',
        boxShadow: '0 4px 24px rgba(28,26,22,0.08)',
        background: '#F5F0E8',
        width: 375,
      }}>
        {children}
      </div>
      {label && (
        <div style={{
          fontFamily: '"Courier New", Courier, monospace',
          fontSize: 11,
          color: '#9A8F7E',
          marginTop: 10,
          letterSpacing: '0.08em',
          textTransform: 'uppercase',
        }}>
          {label}
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────
// App
// ─────────────────────────────────────────────
function App() {
  return (
    <DesignCanvas>

      {/* ══════════════════════════════════════
          TASK A — Public Profile Page /[slug]
      ══════════════════════════════════════ */}
      <DCSection
        id="profile"
        title="Task A — Public Profile Page"
        subtitle="/[slug] · Mobile 375px · Courier New · Beige"
      >
        <DCArtboard id="profile-main" label="Profile — /martin" width={375}>
          <PhoneWrap
            note="Each item is a tappable WhatsApp link. Categories are non-tappable uppercase headers."
          >
            <ProfileScreen />
          </PhoneWrap>
        </DCArtboard>
      </DCSection>

      {/* ══════════════════════════════════════
          TASK B — Create / Edit Form
      ══════════════════════════════════════ */}
      <DCSection
        id="form"
        title="Task B — Create & Edit Form"
        subtitle="/create and /edit/[token] · Single scroll · Fully interactive"
      >

        <DCArtboard id="create-form" label="Create Form — /create" width={375}>
          <PhoneWrap
            note="Blank state. Add/remove categories and items are live."
          >
            <CreateFormScreen editMode={false} />
          </PhoneWrap>
        </DCArtboard>

        <DCArtboard id="edit-form" label="Edit Form — /edit/[token]" width={375}>
          <PhoneWrap
            note="Pre-populated. Same layout; button reads 'Save changes'."
          >
            <CreateFormScreen editMode={true} />
          </PhoneWrap>
        </DCArtboard>

        <DCArtboard id="done-screen" label="Done Screen" width={375}>
          <PhoneWrap
            note="Shown after Create or Edit submit. Copy buttons are interactive."
          >
            <DoneScreen />
          </PhoneWrap>
        </DCArtboard>

      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
